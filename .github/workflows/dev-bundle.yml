name: Dev Bundle Lifecycle

on:
  push:
    branches-ignore:
      - main

  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read
  id-token: write

jobs:
  unit-tests:
    name: Run unit tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run unit tests
        run: uv run --no-dev --group unit pytest tests/bronze/ -v

  deploy-dev:
    name: Deploy dev bundle
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: development
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Derive branch slug
        id: branch
        run: |
          SLUG=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9]/_/g')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Validate bundle
        run: databricks bundle validate -t dev --var="branch=${{ steps.branch.outputs.slug }}"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Deploy bundle to dev
        run: databricks bundle deploy -t dev --var="branch=${{ steps.branch.outputs.slug }}"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  destroy-dev:
    name: Destroy dev bundle
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Derive branch slug
        id: branch
        run: |
          SLUG=$(echo "${{ github.event.pull_request.head.ref }}" | sed 's/[^a-zA-Z0-9]/_/g')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Destroy dev bundle
        run: databricks bundle destroy -t dev --var="branch=${{ steps.branch.outputs.slug }}" --auto-approve || true
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
