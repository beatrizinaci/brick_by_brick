name: Version Bump

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version on merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check if src/ was changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/' | wc -l)
          echo "src_changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Detect bump category from PR title
        if: steps.changes.outputs.src_changed != '0'
        id: category
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if echo "$PR_TITLE" | grep -qi '\[MAJOR\]'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$PR_TITLE" | grep -qi '\[MINOR\]'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif echo "$PR_TITLE" | grep -qi '\[PATCH\]'; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "::error::PR title must contain [MAJOR], [MINOR], or [PATCH]"
            exit 1
          fi

      - name: Bump version in pyproject.toml
        if: steps.changes.outputs.src_changed != '0'
        run: |
          CURRENT=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.category.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          sed -i "s/version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" pyproject.toml
          echo "Bumped version: $CURRENT -> $NEW_VERSION"

      - name: Commit and push version bump
        if: steps.changes.outputs.src_changed != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to $(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')"
          git push
