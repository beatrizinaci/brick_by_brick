resources:
  jobs:
    batch_pipeline:
      name: brick_by_brick_batch
      tags:
        branch: ${var.branch}
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"  # daily at 6am
        timezone_id: America/New_York
      environments:
        - environment_key: default
          spec:
            environment_version: '2'
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: bronze_citibike_system_information
          python_wheel_task:
            package_name: brick_by_brick
            entry_point: bronze_citibike_system_information
            parameters:
              - ${var.catalog}
              - ${var.schema}
          environment_key: default

        - task_key: bronze_citibike_system_regions
          python_wheel_task:
            package_name: brick_by_brick
            entry_point: bronze_citibike_system_regions
            parameters:
              - ${var.catalog}
              - ${var.schema}
          environment_key: default
      # Tasks will be added as we build the batch extractions:
      # - bronze_citibike_trips
      # - silver / gold transformations
