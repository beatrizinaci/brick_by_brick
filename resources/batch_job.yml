resources:
  jobs:
    batch_pipeline:
      name: brick_by_brick_batch
      tags:
        branch: ${var.branch}
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"  # daily at 6am
        timezone_id: America/New_York
      environments:
        - environment_key: default
          spec:
            environment_version: '2'
            dependencies:
              - ../dist/*.whl
      tasks: []
      # Tasks will be added as we build the batch extractions:
      # - bronze_citibike_station_info
      # - bronze_citibike_trips
      # - silver / gold transformations
