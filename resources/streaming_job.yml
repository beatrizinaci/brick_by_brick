resources:
  jobs:
    streaming_pipeline:
      name: brick_by_brick_streaming
      tags:
        branch: ${var.branch}
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"  # every 5 minutes
        timezone_id: America/New_York
      environments:
        - environment_key: default
          spec:
            environment_version: '2'
            dependencies:
              - ../dist/*.whl
      tasks:
        # ── Bronze ──────────────────────────────────────────────
        - task_key: bronze_citibike_station_status
          environment_key: default
          python_wheel_task:
            package_name: brick_by_brick
            entry_point: citibike_station_status
            parameters:
              - ${var.catalog}
              - ${var.schema}
