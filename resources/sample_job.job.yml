resources:
  jobs:
    sample_job:
      name: sample_job
      environments:
        - environment_key: default
          spec:
            environment_version: '2'
      tasks:
        - task_key: sample_job_task
          environment_key: default
          spark_python_task:
            python_file: ../src/brick_by_brick/hello.py

        - task_key: sample_job_task_2
          environment_key: default
          spark_python_task:
            python_file: ../src/brick_by_brick/hello.py
          depends_on: 
            - task_key: sample_job_task