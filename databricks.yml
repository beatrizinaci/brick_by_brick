# This is a Databricks asset bundle definition for brick_by_brick.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: brick_by_brick
  uuid: 8c4349e5-3989-4042-adda-c7f9e20ea96f

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel 

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  branch:
    description: Branch identifier used to isolate dev deployments
    default: ${workspace.current_user.short_name}
  job_suffix:
    description: Suffix appended to job name for dev isolation
    default: ""

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # - In CI, each branch gets its own root_path and schema for full isolation.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-0a03e77d-9d93.cloud.databricks.com
      root_path: /Workspace/Users/binaciodeoliveira@gmail.com/.bundle/${bundle.name}/dev/${var.branch}
    variables:
      catalog: brick_by_brick
      schema: ${var.branch}
      job_suffix: _${var.branch}
  prod:
    mode: production
    workspace:
      host: https://dbc-0a03e77d-9d93.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/binaciodeoliveira@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/binaciodeoliveira@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: brick_by_brick
      schema: prod
    permissions:
      - user_name: binaciodeoliveira@gmail.com
        level: CAN_MANAGE
